# ============================================
# NEXUS BACKEND - MAIN CONFIGURATION
# ============================================

spring.application.name=nexus

# ============================================
# ACTIVE PROFILE
# ============================================
# Change to 'prod' before deploying to Render
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================
# SERVER
# ============================================
server.port=${PORT:8081}

# ============================================
# JWT (Shared across all profiles)
# ============================================
jwt.secret=${JWT_SECRET:nexusSecretKeyForJWTTokenGeneration2024SecureLongKey}
jwt.expiration=86400000

# ============================================
# SWAGGER / API DOCS
# ============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ============================================
# FILE UPLOAD (Default)
# ============================================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ============================================
# LOGGING (Default)
# ============================================
logging.level.com.nexus=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN