# ============================================
# PROD PROFILE — PostgreSQL
# ============================================

# ===== DATABASE (PostgreSQL) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== H2 CONSOLE (Disabled) =====
spring.h2.console.enabled=false

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===== NEWS API =====
news.api.key=${NEWS_API_KEY}
news.api.base-url=${NEWS_API_URL:https://newsapi.org/v2}

# ===== HUGGING FACE =====
huggingface.api.key=${HUGGINGFACE_API_KEY}
huggingface.api.url=huggingface.api.url=${HUGGINGFACE_API_URL:https://router.huggingface.co/hf-inference/models}

# ===== LOGGING =====
logging.level.com.nexus=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN