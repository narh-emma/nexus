# ============================================
# PROD PROFILE — PostgreSQL
# ============================================

# ===== DATABASE (PostgreSQL) =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== H2 CONSOLE (Disabled) =====
spring.h2.console.enabled=false

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===== NEWS API =====
news.api.key=${NEWS_API_KEY}
news.api.base-url=${NEWS_API_URL:https://newsapi.org/v2}

# ===== TRANSLATION / SPEECH SERVICES =====
# Groq handles both text-to-text translation AND speech-to-text (Whisper) --
# one key, free tier, no payment method required.
groq.api.key=${GROQ_API_KEY}
# openai.api.key removed -- no longer used, avoids needing to fund an OpenAI account.
# elevenlabs.api.key removed -- GroqService/TranslateService no longer call ElevenLabs.
# Edge TTS needs no API key, but the `edge-tts` CLI must be installed and on PATH
# in the production container/host (pip install edge-tts). If it's not on PATH,
# set: edge-tts.binary-path=/usr/local/bin/edge-tts (or wherever it's installed)

sendgrid.api.key=${SENDGRID_API_KEY}
spring.mail.username=${GMAIL_USERNAME}

# URL of your frontend, used to build the verification link sent in emails
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ===== LOGGING =====
logging.level.com.nexus=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

nexus.auth-service.base-url=http://localhost:${PORT:8080}
