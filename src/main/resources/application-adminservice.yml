server:
  port: 8085

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:postgresql://localhost:5432/admin_db
    username: ${DB_USERNAME:nexus}
    password: ${DB_PASSWORD:nexus}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

nexus:
  jwt:
    secret: ${JWT_SECRET:change-this-in-prod}
  auth-service:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
