# Server
server.port=8081

# Database
spring.datasource.url=jdbc:h2:mem:nexusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret
nexus.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ===== FILE UPLOAD CONFIGURATION =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Auth Service Base URL (for internal client calls)
nexus.auth-service.base-url=http://localhost:8081

# Logging
logging.level.com.nexus=DEBUG
logging.level.org.springframework.security=DEBUG