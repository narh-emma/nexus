# ============================================
# DEV PROFILE — H2 Database
# ============================================

# ===== SERVER =====
server.port=8081

# ===== DATABASE (H2) =====
spring.datasource.url=jdbc:h2:mem:nexusdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== H2 CONSOLE =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT =====
nexus.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# ===== NEWS API =====
news.api.key=${NEWS_API_KEY:YOUR_NEWSAPI_KEY_HERE}
news.api.base-url=${NEWS_API_URL:https://newsapi.org/v2}

# ===== HUGGING FACE =====
huggingface.api.key=${HUGGINGFACE_API_KEY:your_huggingface_token_here}
huggingface.api.url=${HUGGINGFACE_API_URL:https://api-inference.huggingface.co/models}

# ===== AUTH SERVICE =====
nexus.auth-service.base-url=http://localhost:8081

# ===== LOGGING =====
logging.level.com.nexus=DEBUG
logging.level.org.springframework.security=DEBUG